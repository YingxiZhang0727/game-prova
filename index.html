<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio di Animazione</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #06060c;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* ─── Home ─── */
        #home {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #home.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .home-inner {
            width: 100%;
            max-width: 880px;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            letter-spacing: 0.12em;
            line-height: 1.3;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.55) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .home-subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.04em;
            line-height: 1.6;
        }

        .home-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-top: 40px;
        }

        .home-card {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 22px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(16px);
            text-align: left;
            font-family: inherit;
            color: inherit;
        }

        .home-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .home-card-icon {
            font-size: 1.6rem;
            margin-bottom: 12px;
            display: block;
        }

        .home-card-name {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .home-card-desc {
            margin-top: 6px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.38);
            line-height: 1.5;
        }

        /* ─── Esperienza ─── */
        #experience {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #experience.active {
            opacity: 1;
            visibility: visible;
        }

        .ui {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .header {
            top: 0;
            left: 0;
            right: 0;
            padding: 24px 28px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .header-text {}

        .header h1 {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0.95;
        }

        .header p {
            margin-top: 6px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .back-btn {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.65);
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(12px);
            font-family: inherit;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .hint {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .hint.show {
            opacity: 1;
        }

        .hint span {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <!-- Home -->
    <div id="home">
        <div class="home-inner">
            <h1 class="home-title">Laboratorio di Animazione</h1>
            <p class="home-subtitle">Esplora animazioni visive interattive · Clicca una scheda per iniziare</p>
            <div class="home-cards" id="homeCards"></div>
        </div>
    </div>

    <!-- Esperienza -->
    <div id="experience">
        <div class="ui header">
            <div class="header-text">
                <h1 id="title">Fuochi d'artificio</h1>
                <p id="subtitle">Clicca sullo schermo per far esplodere fuochi d'artificio</p>
            </div>
            <button class="back-btn" id="backBtn" title="Torna alla home" aria-label="Torna alla home">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 10.5 12 3l9 7.5" />
                    <path d="M5 9.5V20h5v-6h4v6h5V9.5" />
                </svg>
            </button>
        </div>

        <div class="ui hint show" id="hint"><span id="hintText">Clicca sullo schermo per provare</span></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const hintEl = document.getElementById('hint');
        const hintTextEl = document.getElementById('hintText');
        const homeEl = document.getElementById('home');
        const experienceEl = document.getElementById('experience');
        const homeCardsEl = document.getElementById('homeCards');
        const backBtn = document.getElementById('backBtn');

        let W, H, mouse = { x: W / 2, y: H / 2, down: false };
        let currentEffect = 'fireworks';
        let isHome = true;
        let hintTimer;
        let homeParticles = [];

        const EFFECTS = [
            { id: 'fireworks', name: 'Fuochi d\'artificio', icon: '🎆', desc: 'Clicca per far esplodere fuochi d\'artificio con effetti sonori', subtitle: 'Clicca sullo schermo per far esplodere fuochi d\'artificio con effetti sonori', hint: 'Clicca sullo schermo per provare' },
            { id: 'particles', name: 'Particelle del mouse', icon: '✨', desc: 'Muovi il mouse per lasciare una scia di particelle', subtitle: 'Muovi il mouse, lascia una scia di particelle colorate', hint: 'Muovi il mouse per provare' },
            { id: 'fluid', name: 'Sfondo fluido', icon: '🌌', desc: 'Sfondo con colori fluenti da sogno', subtitle: 'Sfondo con colori fluenti da sogno', hint: 'Muovi il mouse per influenzare il fluido' },
            { id: 'sand', name: 'Simulazione sabbia', icon: '🏜️', desc: 'Clicca per aggiungere sabbia con effetto sonoro', subtitle: 'Clicca per aggiungere sabbia con effetto sonoro', hint: 'Clicca per aggiungere sabbia' },
            { id: 'ripples', name: 'Onde d\'acqua', icon: '💧', desc: 'Clicca sulla superficie per creare onde e suoni d\'acqua', subtitle: 'Clicca sull\'acqua per creare onde e suoni d\'acqua', hint: 'Clicca per creare onde' },
        ];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function showHint(text) {
            if (!text) { hintEl.classList.remove('show'); return; }
            hintTextEl.textContent = text;
            hintEl.classList.add('show');
            clearTimeout(hintTimer);
            hintTimer = setTimeout(() => hintEl.classList.remove('show'), 3000);
        }

        function initHomeParticles() {
            homeParticles = [];
            for (let i = 0; i < 100; i++) {
                homeParticles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: 0.8 + Math.random() * 2,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.25,
                    hue: 200 + Math.random() * 80,
                    alpha: 0.15 + Math.random() * 0.35
                });
            }
        }

        function updateHome() {
            const gradient = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
            gradient.addColorStop(0, '#0d0d1a');
            gradient.addColorStop(1, '#06060c');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = 'rgba(5, 5, 15, 0.12)';
            ctx.fillRect(0, 0, W, H);

            homeParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = W;
                if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H;
                if (p.y > H) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 70%, ${p.alpha})`;
                ctx.fill();
            });
        }

        function enterExperience(id) {
            isHome = false;
            homeEl.classList.add('hidden');
            experienceEl.classList.add('active');
            canvas.style.cursor = 'crosshair';
            switchEffect(id || 'fireworks');
        }

        function goHome() {
            isHome = true;
            homeEl.classList.remove('hidden');
            experienceEl.classList.remove('active');
            canvas.style.cursor = 'default';
            initHomeParticles();
        }

        function switchEffect(id) {
            currentEffect = id;
            const effect = EFFECTS.find(e => e.id === id);
            titleEl.textContent = effect.name;
            subtitleEl.textContent = effect.subtitle;
            initEffect(id);
            showHint(effect.hint);
        }

        // ─── Effetti sonori fuochi d'artificio (sintesi integrata) ───
        let audioCtx = null;
        let masterGain = null;
        let soundEnabled = true;

        function getAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 1;
                masterGain.connect(audioCtx.destination);
            }
            return audioCtx;
        }

        async function unlockAudio() {
            const ac = getAudio();
            if (ac.state !== 'running') {
                await ac.resume();
            }
            return ac;
        }

        function connectOutput(node, x) {
            const pan = getAudio().createStereoPanner();
            pan.pan.value = W > 0 ? Math.max(-1, Math.min(1, (x / W - 0.5) * 1.6)) : 0;
            node.connect(pan);
            pan.connect(masterGain);
        }

        // Suono di lancio ad ogni clic
        function playClickSound(x) {
            if (!soundEnabled) return;
            const ac = getAudio();
            const now = ac.currentTime;

            const osc = ac.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.12);
            const oscGain = ac.createGain();
            oscGain.gain.setValueAtTime(0.35, now);
            oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.connect(oscGain);
            connectOutput(oscGain, x);
            osc.start(now);
            osc.stop(now + 0.16);

            const len = Math.floor(ac.sampleRate * 0.08);
            const buf = ac.createBuffer(1, len, ac.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
            const noise = ac.createBufferSource();
            noise.buffer = buf;
            const nGain = ac.createGain();
            nGain.gain.setValueAtTime(0.2, now);
            nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            noise.connect(nGain);
            connectOutput(nGain, x);
            noise.start(now);
            noise.stop(now + 0.09);
        }

        function playExplosionSound(x) {
            if (!soundEnabled) return;
            const ac = getAudio();
            const now = ac.currentTime;

            const boom = ac.createOscillator();
            boom.type = 'sine';
            boom.frequency.setValueAtTime(140 + Math.random() * 30, now);
            boom.frequency.exponentialRampToValueAtTime(35, now + 0.5);
            const boomGain = ac.createGain();
            boomGain.gain.setValueAtTime(0.55, now);
            boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            boom.connect(boomGain);
            connectOutput(boomGain, x);
            boom.start(now);
            boom.stop(now + 0.62);

            const burstLen = 0.22;
            const burstBuf = ac.createBuffer(1, ac.sampleRate * burstLen, ac.sampleRate);
            const burstData = burstBuf.getChannelData(0);
            for (let i = 0; i < burstData.length; i++) {
                const t = i / burstData.length;
                burstData[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2);
            }
            const burst = ac.createBufferSource();
            burst.buffer = burstBuf;
            const burstGain = ac.createGain();
            burstGain.gain.setValueAtTime(0.35, now);
            burstGain.gain.exponentialRampToValueAtTime(0.001, now + burstLen);
            burst.connect(burstGain);
            connectOutput(burstGain, x);
            burst.start(now);
            burst.stop(now + burstLen);

            const pops = 5;
            for (let i = 0; i < pops; i++) {
                const t = now + 0.04 + i * 0.03;
                const pop = ac.createOscillator();
                pop.type = 'square';
                pop.frequency.value = 800 + Math.random() * 1500;
                const popGain = ac.createGain();
                popGain.gain.setValueAtTime(0.03, t);
                popGain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
                pop.connect(popGain);
                connectOutput(popGain, x);
                pop.start(t);
                pop.stop(t + 0.025);
            }
        }

        // Suono granulare della sabbia
        function playSandSound(x) {
            if (!soundEnabled) return;
            const ac = getAudio();
            const now = ac.currentTime;
            const duration = 0.3;

            const len = Math.floor(ac.sampleRate * duration);
            const buf = ac.createBuffer(1, len, ac.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < len; i++) {
                const t = i / len;
                const envelope = Math.sin(Math.PI * t);
                d[i] = (Math.random() * 2 - 1) * envelope * envelope;
            }
            const noise = ac.createBufferSource();
            noise.buffer = buf;
            const filter = ac.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 900 + Math.random() * 600;
            filter.Q.value = 0.7;
            const gain = ac.createGain();
            gain.gain.setValueAtTime(0.32, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            noise.connect(filter);
            filter.connect(gain);
            connectOutput(gain, x);
            noise.start(now);
            noise.stop(now + duration);

            const grains = 7 + Math.floor(Math.random() * 5);
            for (let i = 0; i < grains; i++) {
                const t = now + i * 0.022 + Math.random() * 0.018;
                const grain = ac.createOscillator();
                grain.type = 'square';
                grain.frequency.value = 180 + Math.random() * 350;
                const gGain = ac.createGain();
                gGain.gain.setValueAtTime(0.045, t);
                gGain.gain.exponentialRampToValueAtTime(0.001, t + 0.018);
                grain.connect(gGain);
                connectOutput(gGain, x);
                grain.start(t);
                grain.stop(t + 0.02);
            }
        }

        // ─── File audio acqua reale ───
        let waterFlowBuffer = null;

        function loadSoundFile(url) {
            return new Promise((resolve, reject) => {
                const req = new XMLHttpRequest();
                req.open('GET', url, true);
                req.responseType = 'arraybuffer';
                req.onload = () => {
                    getAudio().decodeAudioData(req.response, resolve, reject);
                };
                req.onerror = reject;
                req.send();
            });
        }

        function loadWaterSounds() {
            loadSoundFile('sounds/water-flow.mp3')
                .then(buf => { waterFlowBuffer = buf; })
                .catch(() => console.warn('Caricamento suoni acqua fallito, apri la pagina tramite server locale'));
        }

        function playSample(buffer, x, { offset = 0, duration, volume = 0.65, rate = 1 } = {}) {
            const ac = getAudio();
            const now = ac.currentTime;
            const playDur = duration ?? Math.min(2.2, buffer.duration - offset);

            const source = ac.createBufferSource();
            source.buffer = buffer;
            source.playbackRate.value = rate;

            const gain = ac.createGain();
            gain.gain.setValueAtTime(0.001, now);
            gain.gain.exponentialRampToValueAtTime(volume, now + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.001, now + playDur);

            source.connect(gain);
            connectOutput(gain, x);
            source.start(now, offset, playDur);
        }

        // Onde d'acqua — registrazione acqua reale
        function playRippleSound(x) {
            if (!soundEnabled) return;

            if (waterFlowBuffer) {
                const maxOffset = Math.max(0, waterFlowBuffer.duration - 2.5);
                const offset = Math.random() * maxOffset;
                playSample(waterFlowBuffer, x, {
                    offset,
                    duration: 1.6 + Math.random() * 0.6,
                    volume: 0.55 + Math.random() * 0.15,
                    rate: 0.92 + Math.random() * 0.12
                });
                return;
            }

            const fallback = new Audio('sounds/water-flow.mp3');
            fallback.volume = 0.55;
            fallback.currentTime = Math.random() * 3;
            fallback.play().catch(() => { });
        }

        // ─── Fuochi d'artificio ───
        let fireworks = [], sparks = [];

        function initFireworks() {
            fireworks = [];
            sparks = [];
        }

        function launchFirework(x, y) {
            const hue = Math.random() * 360;
            fireworks.push({
                x, y: H,
                tx: x + (Math.random() - 0.5) * 80,
                ty: y,
                speed: 8 + Math.random() * 4,
                hue,
                soundX: x,
                trail: []
            });
        }

        function explode(x, y, hue, soundX) {
            playExplosionSound(soundX ?? x);
            const count = 60 + Math.floor(Math.random() * 40);
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
                const speed = 2 + Math.random() * 5;
                sparks.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    hue: hue + Math.random() * 30 - 15,
                    life: 1,
                    decay: 0.002 + Math.random() * 0.003,
                    size: 1.5 + Math.random() * 2
                });
            }
        }

        function updateFireworks() {
            ctx.fillStyle = 'rgba(5, 5, 15, 0.08)';
            ctx.fillRect(0, 0, W, H);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.trail.push({ x: fw.x, y: fw.y });
                if (fw.trail.length > 8) fw.trail.shift();
                const dx = fw.tx - fw.x;
                const dy = fw.ty - fw.y;
                const dist = Math.hypot(dx, dy);
                if (dist < fw.speed) {
                    explode(fw.x, fw.y, fw.hue, fw.soundX);
                    fireworks.splice(i, 1);
                    continue;
                }
                if (dist > 0) {
                    fw.x += (dx / dist) * fw.speed;
                    fw.y += (dy / dist) * fw.speed;
                }

                fw.trail.forEach((t, j) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${fw.hue}, 100%, 70%, ${j / fw.trail.length * 0.6})`;
                    ctx.fill();
                });
                ctx.beginPath();
                ctx.arc(fw.x, fw.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${fw.hue}, 100%, 80%)`;
                ctx.fill();
            }

            sparks.forEach((s, i) => {
                s.x += s.vx;
                s.y += s.vy;
                s.vy += 0.025;
                s.vx *= 0.99;
                s.life -= s.decay;
                if (s.life <= 0) { sparks.splice(i, 1); return; }
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${s.hue}, 100%, 65%, ${s.life})`;
                ctx.fill();
            });
        }

        // ─── Particelle del mouse ───
        let trailParticles = [];

        function initParticles() {
            trailParticles = [];
        }

        function updateParticles() {
            ctx.fillStyle = 'rgba(5, 5, 15, 0.15)';
            ctx.fillRect(0, 0, W, H);

            if (mouse.x > 0 && mouse.y > 0) {
                for (let i = 0; i < 3; i++) {
                    trailParticles.push({
                        x: mouse.x + (Math.random() - 0.5) * 20,
                        y: mouse.y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        hue: (Date.now() / 20 + Math.random() * 60) % 360,
                        life: 1,
                        size: 2 + Math.random() * 4
                    });
                }
            }

            trailParticles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.015;
                p.size *= 0.99;
                if (p.life <= 0) { trailParticles.splice(i, 1); return; }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 90%, 65%, ${p.life * 0.8})`;
                ctx.fill();
            });
        }

        // ─── Sfondo fluido ───
        let fluidParticles = [];

        function initFluid() {
            fluidParticles = [];
            for (let i = 0; i < 120; i++) {
                fluidParticles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    vx: 0, vy: 0,
                    hue: Math.random() * 60 + 200,
                    size: 20 + Math.random() * 40
                });
            }
        }

        function updateFluid() {
            ctx.fillStyle = 'rgba(5, 5, 20, 0.08)';
            ctx.fillRect(0, 0, W, H);

            const time = Date.now() * 0.001;
            fluidParticles.forEach(p => {
                const angle = Math.sin(p.x * 0.005 + time) * Math.cos(p.y * 0.005 + time * 0.7) * Math.PI * 2;
                p.vx += Math.cos(angle) * 0.3;
                p.vy += Math.sin(angle) * 0.3;

                const mdx = mouse.x - p.x;
                const mdy = mouse.y - p.y;
                const mdist = Math.hypot(mdx, mdy);
                if (mdist < 200 && mdist > 0) {
                    p.vx += (mdx / mdist) * 0.8;
                    p.vy += (mdy / mdist) * 0.8;
                }

                p.vx *= 0.92;
                p.vy *= 0.92;
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = W;
                if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H;
                if (p.y > H) p.y = 0;

                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, `hsla(${p.hue + time * 10}, 80%, 60%, 0.15)`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
            });
        }

        // ─── Simulazione sabbia ───
        const SAND_CELL = 3;
        let sandGrid, sandCols, sandRows;

        function initSand() {
            sandCols = Math.ceil(W / SAND_CELL);
            sandRows = Math.ceil(H / SAND_CELL);
            sandGrid = new Uint8Array(sandCols * sandRows);
        }

        function sandIndex(x, y) {
            return y * sandCols + x;
        }

        function addSand(cx, cy, radius) {
            const r = radius || 8;
            for (let dy = -r; dy <= r; dy++) {
                for (let dx = -r; dx <= r; dx++) {
                    if (dx * dx + dy * dy <= r * r) {
                        const gx = Math.floor((cx + dx * SAND_CELL) / SAND_CELL);
                        const gy = Math.floor((cy + dy * SAND_CELL) / SAND_CELL);
                        if (gx >= 0 && gx < sandCols && gy >= 0 && gy < sandRows) {
                            sandGrid[sandIndex(gx, gy)] = 1;
                        }
                    }
                }
            }
        }

        function updateSand() {
            for (let y = sandRows - 2; y >= 0; y--) {
                for (let x = 0; x < sandCols; x++) {
                    const i = sandIndex(x, y);
                    if (!sandGrid[i]) continue;
                    const below = sandIndex(x, y + 1);
                    if (!sandGrid[below]) {
                        sandGrid[i] = 0;
                        sandGrid[below] = 1;
                    } else {
                        const dir = Math.random() < 0.5 ? -1 : 1;
                        const nx = x + dir;
                        if (nx >= 0 && nx < sandCols && !sandGrid[sandIndex(nx, y + 1)]) {
                            sandGrid[i] = 0;
                            sandGrid[sandIndex(nx, y + 1)] = 1;
                        }
                    }
                }
            }

            ctx.fillStyle = '#1a1510';
            ctx.fillRect(0, 0, W, H);

            for (let y = 0; y < sandRows; y++) {
                for (let x = 0; x < sandCols; x++) {
                    if (sandGrid[sandIndex(x, y)]) {
                        const shade = 180 + Math.floor(Math.random() * 40);
                        ctx.fillStyle = `rgb(${shade}, ${shade - 30}, ${shade - 60})`;
                        ctx.fillRect(x * SAND_CELL, y * SAND_CELL, SAND_CELL, SAND_CELL);
                    }
                }
            }
        }

        // ─── Onde d'acqua (simulazione fisica) ───
        const RIPPLE_CELL = 4;
        let rippleCols, rippleRows;
        let rippleCur, ripplePrev;
        let waterBgData = null;

        function initRipples() {
            rippleCols = Math.ceil(W / RIPPLE_CELL) + 2;
            rippleRows = Math.ceil(H / RIPPLE_CELL) + 2;
            rippleCur = new Float32Array(rippleCols * rippleRows);
            ripplePrev = new Float32Array(rippleCols * rippleRows);
            buildWaterBackground();
        }

        function rIdx(x, y) {
            return y * rippleCols + x;
        }

        function buildWaterBackground() {
            const bg = document.createElement('canvas');
            bg.width = W;
            bg.height = H;
            const bctx = bg.getContext('2d');
            const grad = bctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#061828');
            grad.addColorStop(0.4, '#0a2848');
            grad.addColorStop(1, '#0d3560');
            bctx.fillStyle = grad;
            bctx.fillRect(0, 0, W, H);

            const time = Date.now() * 0.001;
            for (let i = 0; i < 6; i++) {
                bctx.beginPath();
                bctx.moveTo(0, H * 0.25 + i * 55 + Math.sin(time + i) * 8);
                for (let x = 0; x <= W; x += 16) {
                    bctx.lineTo(x, H * 0.25 + i * 55 + Math.sin(x * 0.008 + time * 0.6 + i) * 6);
                }
                bctx.strokeStyle = `rgba(100, 190, 255, ${0.04 + i * 0.008})`;
                bctx.lineWidth = 1.5;
                bctx.stroke();
            }

            for (let i = 0; i < 50; i++) {
                const px = Math.random() * W;
                const py = Math.random() * H;
                const r = 30 + Math.random() * 90;
                const g = bctx.createRadialGradient(px, py, 0, px, py, r);
                g.addColorStop(0, `rgba(130, 210, 255, ${0.02 + Math.random() * 0.03})`);
                g.addColorStop(1, 'transparent');
                bctx.fillStyle = g;
                bctx.fillRect(px - r, py - r, r * 2, r * 2);
            }

            waterBgData = bctx.getImageData(0, 0, W, H).data;
        }

        function addRipple(cx, cy) {
            const gx = Math.floor(cx / RIPPLE_CELL);
            const gy = Math.floor(cy / RIPPLE_CELL);
            const strength = 360;
            const radius = 5;
            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    const x = gx + dx, y = gy + dy;
                    if (x > 0 && x < rippleCols - 1 && y > 0 && y < rippleRows - 1) {
                        const d = dx * dx + dy * dy;
                        if (d <= radius * radius) {
                            rippleCur[rIdx(x, y)] += strength * (1 - d / (radius * radius));
                        }
                    }
                }
            }
        }

        function stepRippleSimulation() {
            const damping = 0.978;
            for (let y = 1; y < rippleRows - 1; y++) {
                for (let x = 1; x < rippleCols - 1; x++) {
                    const i = rIdx(x, y);
                    const val = (
                        rippleCur[rIdx(x - 1, y)] +
                        rippleCur[rIdx(x + 1, y)] +
                        rippleCur[rIdx(x, y - 1)] +
                        rippleCur[rIdx(x, y + 1)]
                    ) * 0.5 - ripplePrev[i];
                    ripplePrev[i] = val * damping;
                }
            }
            const tmp = rippleCur;
            rippleCur = ripplePrev;
            ripplePrev = tmp;
        }

        function renderRippleSurface() {
            if (!waterBgData) return;
            const imageData = ctx.createImageData(W, H);
            const out = imageData.data;
            const bg = waterBgData;
            const disp = 0.14;
            const step = W > 1200 ? 2 : 1;

            for (let y = 0; y < H; y += step) {
                const gy = Math.min(rippleRows - 2, Math.max(1, Math.floor(y / RIPPLE_CELL)));
                for (let x = 0; x < W; x += step) {
                    const gx = Math.min(rippleCols - 2, Math.max(1, Math.floor(x / RIPPLE_CELL)));
                    const ri = rIdx(gx, gy);
                    const dx = (rippleCur[rIdx(gx + 1, gy)] - rippleCur[rIdx(gx - 1, gy)]) * disp;
                    const dy = (rippleCur[rIdx(gx, gy + 1)] - rippleCur[rIdx(gx, gy - 1)]) * disp;

                    const sx = Math.max(0, Math.min(W - 1, (x + dx) | 0));
                    const sy = Math.max(0, Math.min(H - 1, (y + dy) | 0));
                    const si = (sy * W + sx) * 4;

                    const h = rippleCur[ri];
                    const spec = Math.max(-20, Math.min(60, h * 0.18));
                    const r = Math.max(0, Math.min(255, bg[si] + spec * 0.3));
                    const g = Math.max(0, Math.min(255, bg[si + 1] + spec * 0.5));
                    const b = Math.max(0, Math.min(255, bg[si + 2] + spec * 0.9));

                    for (let py = 0; py < step && y + py < H; py++) {
                        for (let px = 0; px < step && x + px < W; px++) {
                            const oi = ((y + py) * W + (x + px)) * 4;
                            out[oi] = r;
                            out[oi + 1] = g;
                            out[oi + 2] = b;
                            out[oi + 3] = 255;
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function updateRipples() {
            stepRippleSimulation();
            renderRippleSurface();
        }

        // ─── Ciclo principale ───
        const updaters = {
            fireworks: updateFireworks,
            particles: updateParticles,
            fluid: updateFluid,
            sand: updateSand,
            ripples: updateRipples
        };

        const inits = {
            fireworks: initFireworks,
            particles: initParticles,
            fluid: initFluid,
            sand: initSand,
            ripples: initRipples
        };

        function initEffect(id) {
            if (inits[id]) inits[id]();
        }

        function loop() {
            if (isHome) {
                updateHome();
            } else if (updaters[currentEffect]) {
                updaters[currentEffect]();
            }
            requestAnimationFrame(loop);
        }

        function fireFirework(x, y) {
            unlockAudio().then(() => {
                playClickSound(x);
                launchFirework(x, y);
            });
        }

        function pourSand(x, y) {
            unlockAudio().then(() => {
                playSandSound(x);
                addSand(x, y);
            });
        }

        function dropRipple(x, y) {
            unlockAudio().then(() => {
                playRippleSound(x);
                addRipple(x, y);
            });
        }

        // ─── Eventi ───
        canvas.addEventListener('click', (e) => {
            if (isHome) return;
            const x = e.clientX, y = e.clientY;
            if (currentEffect === 'fireworks') fireFirework(x, y);
            if (currentEffect === 'sand') pourSand(x, y);
            if (currentEffect === 'ripples') dropRipple(x, y);
            hintEl.classList.remove('show');
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', () => {
            resize();
            if (isHome) initHomeParticles();
            else initEffect(currentEffect);
        });

        backBtn.addEventListener('click', goHome);

        // ─── Schede home ───
        EFFECTS.forEach(e => {
            const card = document.createElement('button');
            card.className = 'home-card';
            card.innerHTML = `<span class="home-card-icon">${e.icon}</span><div class="home-card-name">${e.name}</div><div class="home-card-desc">${e.desc}</div>`;
            card.addEventListener('click', () => enterExperience(e.id));
            homeCardsEl.appendChild(card);
        });

        resize();
        loadWaterSounds();
        initHomeParticles();
        loop();
    </script>
</body>

</html>
