<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji 贪吃蛇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 24px;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #a8ff78, #78ffd6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 20px; }
    .screen.active { display: flex; }

    .subtitle { color: #94a3b8; font-size: 0.95rem; }

    .mode-cards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-card {
      width: 150px;
      padding: 22px 14px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .mode-card:hover { transform: translateY(-3px); border-color: #78ffd6; }
    .mode-card .icon { font-size: 2.2rem; margin-bottom: 8px; }
    .mode-card h3 { margin-bottom: 6px; }
    .mode-card p { font-size: 0.78rem; color: #94a3b8; line-height: 1.5; }

    .game-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .board-wrap {
      border-radius: 14px;
      padding: 4px;
      background: linear-gradient(135deg, #a8ff78, #78ffd6);
      box-shadow: 0 0 40px rgba(120, 255, 214, 0.2);
    }

    #gameCanvas {
      display: block;
      border-radius: 10px;
      background: #0d1b1e;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 140px;
    }

    .panel-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
    }

    .panel-box h4 {
      font-size: 0.72rem;
      color: #94a3b8;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .panel-box .value { font-size: 1.5rem; font-weight: 700; }

    .controls-hint {
      font-size: 0.75rem;
      color: #64748b;
      line-height: 1.9;
    }

    .controls-hint kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 0.68rem;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s;
    }

    .btn:hover { transform: scale(1.03); }
    .btn-primary { background: linear-gradient(135deg, #11998e, #38ef7d); color: #0d1b1e; font-weight: 600; }
    .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

    .mobile-pad {
      display: none;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 6px;
      margin-top: 4px;
    }

    .pad-btn {
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .pad-btn:active { background: rgba(120, 255, 214, 0.3); }
    .pad-btn.empty { visibility: hidden; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.active { display: flex; }

    .modal {
      background: linear-gradient(145deg, #1a2f35, #0f2027);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      max-width: 360px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal .big-emoji { font-size: 3.5rem; margin-bottom: 10px; }
    .modal h2 { margin-bottom: 8px; }
    .modal p { color: #94a3b8; margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    @media (max-width: 600px) {
      .mobile-pad { display: grid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 菜单 -->
    <div id="menuScreen" class="screen active">
      <h1>🐍 Emoji 贪吃蛇</h1>
      <p class="subtitle">吃掉食物让蛇变长，别撞到自己！</p>
      <div class="mode-cards">
        <div class="mode-card" data-speed="slow">
          <div class="icon">🌱</div>
          <h3>简单</h3>
          <p>速度慢<br>适合新手</p>
        </div>
        <div class="mode-card" data-speed="normal">
          <div class="icon">⚡</div>
          <h3>中等</h3>
          <p>速度适中<br>有点挑战</p>
        </div>
        <div class="mode-card" data-speed="fast">
          <div class="icon">🔥</div>
          <h3>困难</h3>
          <p>速度快<br>高手模式</p>
        </div>
      </div>
      <button id="soundBtn" class="btn btn-secondary">🔊 音效：开</button>
    </div>

    <!-- 游戏 -->
    <div id="gameScreen" class="screen">
      <h1>🐍 Emoji 贪吃蛇</h1>
      <div class="game-layout">
        <div class="board-wrap">
          <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div class="side-panel">
          <div class="panel-box">
            <h4>得分</h4>
            <div class="value" id="scoreDisplay">0</div>
          </div>
          <div class="panel-box">
            <h4>最长记录</h4>
            <div class="value" id="bestDisplay">0</div>
          </div>
          <div class="panel-box">
            <h4>蛇的长度</h4>
            <div class="value" id="lengthDisplay">3</div>
          </div>
          <div class="panel-box controls-hint">
            <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 WASD 控制<br>
            <kbd>P</kbd> 暂停
          </div>
          <div class="mobile-pad">
            <div class="pad-btn empty"></div>
            <button class="pad-btn" data-dir="up">↑</button>
            <div class="pad-btn empty"></div>
            <button class="pad-btn" data-dir="left">←</button>
            <button class="pad-btn" data-dir="down">↓</button>
            <button class="pad-btn" data-dir="right">→</button>
          </div>
          <button id="pauseBtn" class="btn btn-secondary">⏸ 暂停</button>
          <button id="quitBtn" class="btn btn-secondary">↩ 返回菜单</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 游戏结束 -->
  <div id="gameOverOverlay" class="overlay">
    <div class="modal">
      <div class="big-emoji" id="overEmoji">💥</div>
      <h2 id="overTitle">游戏结束</h2>
      <p id="overText">再试一次吧！</p>
      <div class="modal-actions">
        <button id="retryBtn" class="btn btn-primary">再来一局</button>
        <button id="menuBtn" class="btn btn-secondary">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- 暂停 -->
  <div id="pauseOverlay" class="overlay">
    <div class="modal">
      <div class="big-emoji">⏸</div>
      <h2>已暂停</h2>
      <p>按 P 继续游戏</p>
      <button id="resumeBtn" class="btn btn-primary">继续</button>
    </div>
  </div>

  <script>
    // ===== 音效 =====
    const Sound = (() => {
      let ctx = null, on = true;
      const getCtx = () => { if (!ctx) ctx = new AudioContext(); return ctx; };
      const resume = () => { if (ctx?.state === 'suspended') ctx.resume(); };

      function tone(freq, dur, vol = 0.12, type = 'sine', delay = 0) {
        if (!on) return;
        resume();
        const c = getCtx();
        const o = c.createOscillator(), g = c.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, c.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + delay); o.stop(c.currentTime + delay + dur);
      }

      return {
        toggle() { on = !on; return on; },
        isOn() { return on; },
        move() { tone(300, 0.04, 0.06); },
        eat() { [523, 659, 784].forEach((f, i) => tone(f, 0.1, 0.1, 'sine', i * 0.07)); },
        die() { [400, 300, 200, 150].forEach((f, i) => tone(f, 0.2, 0.1, 'sawtooth', i * 0.12)); },
        win() { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.15, 0.12, 'sine', i * 0.1)); }
      };
    })();

    // ===== 游戏配置 =====
    const GRID = 20;
    const CELL = 20;
    const SPEEDS = { slow: 180, normal: 120, fast: 75 };
    const SNAKE_EMOJI = '🐍';
    const FOOD_EMOJIS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍉', '🍌'];
    const EMOJI_FONT = '"Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", emoji, sans-serif';

    let speed = 'normal';
    let snake, dir, nextDir, food, score, best, paused, gameOver, loopTimer;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 读取最高分
    best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
    document.getElementById('bestDisplay').textContent = best;

    function randFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      return { ...pos, emoji: FOOD_EMOJIS[Math.floor(Math.random() * FOOD_EMOJIS.length)] };
    }

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = randFood();
      score = 0;
      paused = false;
      gameOver = false;
      updateUI();
      draw();
    }

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('lengthDisplay').textContent = snake.length;
      document.getElementById('bestDisplay').textContent = best;
    }

    function drawEmoji(x, y, emoji, size = CELL) {
      const px = x * CELL, py = y * CELL;
      ctx.font = `${size - 2}px ${EMOJI_FONT}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(emoji, px + CELL / 2, py + CELL / 2 + 1);
    }

    function draw() {
      ctx.fillStyle = '#0d1b1e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 网格
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, GRID * CELL); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(GRID * CELL, i * CELL); ctx.stroke();
      }

      // 食物
      drawEmoji(food.x, food.y, food.emoji);

      // 蛇身
      snake.forEach((seg, i) => {
        if (i === 0) {
          // 蛇头带方向感
          ctx.fillStyle = 'rgba(120, 255, 214, 0.15)';
          ctx.beginPath();
          ctx.arc(seg.x * CELL + CELL / 2, seg.y * CELL + CELL / 2, CELL / 2 - 1, 0, Math.PI * 2);
          ctx.fill();
          drawEmoji(seg.x, seg.y, '🐲');
        } else {
          ctx.fillStyle = `rgba(56, 239, 125, ${0.15 + (1 - i / snake.length) * 0.2})`;
          ctx.fillRect(seg.x * CELL + 2, seg.y * CELL + 2, CELL - 4, CELL - 4);
          drawEmoji(seg.x, seg.y, '🟢', CELL - 4);
        }
      });
    }

    function tick() {
      if (paused || gameOver) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 穿墙
      if (head.x < 0) head.x = GRID - 1;
      if (head.x >= GRID) head.x = 0;
      if (head.y < 0) head.y = GRID - 1;
      if (head.y >= GRID) head.y = 0;

      // 撞自己
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        Sound.eat();
        food = randFood();
        if (score > best) {
          best = score;
          localStorage.setItem('snakeBest', best);
        }
        updateUI();
      } else {
        snake.pop();
        Sound.move();
      }

      draw();
    }

    function setDirection(x, y) {
      if (paused || gameOver) return;
      // 不能反向
      if (x === -dir.x && y === -dir.y && snake.length > 1) return;
      nextDir = { x, y };
    }

    function startLoop() {
      clearInterval(loopTimer);
      loopTimer = setInterval(tick, SPEEDS[speed]);
    }

    function startGame(selectedSpeed) {
      speed = selectedSpeed;
      hideOverlay('pauseOverlay');
      hideOverlay('gameOverOverlay');
      showScreen('gameScreen');
      initGame();
      startLoop();
    }

    function endGame() {
      gameOver = true;
      clearInterval(loopTimer);
      Sound.die();

      const isRecord = score > 0 && score >= best;
      document.getElementById('overEmoji').textContent = isRecord ? '🏆' : '💥';
      document.getElementById('overTitle').textContent = isRecord ? '新纪录！' : '游戏结束';
      document.getElementById('overText').textContent =
        `得分 ${score}，蛇长 ${snake.length}。${isRecord ? '太厉害了！' : '再试一次吧！'}`;
      showOverlay('gameOverOverlay');
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      if (paused) showOverlay('pauseOverlay');
      else hideOverlay('pauseOverlay');
    }

    function quitToMenu() {
      clearInterval(loopTimer);
      gameOver = true;
      hideOverlay('pauseOverlay');
      hideOverlay('gameOverOverlay');
      showScreen('menuScreen');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showOverlay(id) { document.getElementById(id).classList.add('active'); }
    function hideOverlay(id) { document.getElementById(id).classList.remove('active'); }

    // ===== 事件 =====
    document.querySelectorAll('.mode-card').forEach(card => {
      card.addEventListener('click', () => startGame(card.dataset.speed));
    });

    document.getElementById('soundBtn').addEventListener('click', () => {
      const on = Sound.toggle();
      document.getElementById('soundBtn').textContent = on ? '🔊 音效：开' : '🔇 音效：关';
    });

    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('resumeBtn').addEventListener('click', togglePause);
    document.getElementById('quitBtn').addEventListener('click', quitToMenu);
    document.getElementById('retryBtn').addEventListener('click', () => startGame(speed));
    document.getElementById('menuBtn').addEventListener('click', quitToMenu);

    document.querySelectorAll('.pad-btn[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => {
        const d = btn.dataset.dir;
        if (d === 'up') setDirection(0, -1);
        if (d === 'down') setDirection(0, 1);
        if (d === 'left') setDirection(-1, 0);
        if (d === 'right') setDirection(1, 0);
      });
    });

    document.addEventListener('keydown', e => {
      if (document.getElementById('menuScreen').classList.contains('active')) return;
      if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
      if (paused || gameOver) return;

      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
      }
    });

    document.body.addEventListener('click', () => {
      const c = new AudioContext();
      if (c.state === 'suspended') c.resume();
    }, { once: true });
  </script>
</body>
</html>
